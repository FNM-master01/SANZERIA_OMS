<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お客様情報入力シート</title>
    <style>
        /* 印刷設定 */
        @page {
            size: A4;
            margin: 20mm;
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000;
            padding: 15px;
            height: 50px;
            vertical-align: middle;
        }
        th {
            background-color: #f2f2f2;
            width: 30%;
            text-align: left;
            font-weight: bold;
        }
        .required::after {
            content: "【必須】";
            color: #d9534f;
            font-size: 0.8em;
            margin-left: 5px;
        }
        .optional::after {
            content: "（任意）";
            color: #777;
            font-size: 0.8em;
            margin-left: 5px;
        }
        .sub-text {
            font-size: 0.85em;
            color: #555;
            display: block;
            margin-top: 5px;
            font-weight: normal;
        }
        /* メモ欄を広くする */
        .tall-row {
            height: 120px;
        }
        /* チェックボックス風の選択肢 */
        .checkbox-group {
            display: flex;
            gap: 20px;
        }
        .box {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 1px solid #000;
            margin-right: 5px;
            vertical-align: middle;
        }
        /* 印刷ボタン（画面上のみ表示） */
        .no-print {
            text-align: right;
            margin-bottom: 20px;
        }
        @media print {
            .no-print { display: none; }
            body { background: none; }
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <button onclick="window.print()">このページを印刷する</button>
    </div>

    <h1>お客様情報入力シート</h1>

    <table>
        <tr>
            <th class="required">姓・名<span class="sub-text">お客様の氏名</span></th>
            <td></td>
        </tr>
        <tr>
            <th class="required">電話番号<span class="sub-text">連絡先電話番号</span></th>
            <td></td>
        </tr>
        <tr>
            <th class="optional">郵便番号<span class="sub-text">配達先郵便番号</span></th>
            <td>〒</td>
        </tr>
        <tr>
            <th class="optional">住所<span class="sub-text">配達先住所（必ず都道府県から入力）</span></th>
            <td style="height: 80px;"></td>
        </tr>
        <tr>
            <th class="optional">区分</th>
            <td>
                <div class="checkbox-group">
                    <span><span class="box"></span> 通常</span>
                    <span><span class="box"></span> 優先</span>
                    <span><span class="box"></span> 法人</span>
                </div>
            </td>
        </tr>
        <tr>
            <th class="optional">メモ・備考<span class="sub-text">置き配場所・注意事項など</span></th>
            <td class="tall-row"></td>
        </tr>
    </table>

    <p style="margin-top: 20px; font-size: 0.9em; color: #666;">
        ※ご記入いただいた個人情報は、本件の連絡および配達目的以外には使用いたしません。
    </p>
</div>

</body>
</html>
